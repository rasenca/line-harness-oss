name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "YOUR_DEV_ACCOUNT_ID"

[assets]
directory = "dist/client"
binding = "ASSETS"
# Worker を先に走らせて bot UA → OGP HTML 差し込みを可能にする。
# 通常 UA のときは Worker の notFound 内で c.env.ASSETS.fetch(req) を呼んで
# SPA を返す。これが無いと static asset path が Worker をバイパスして
# 直接配信され、bot 判定が効かない。
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "YOUR_DEV_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["* * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# Phase 5 self-update vars — consumed by /admin/update/*. Secrets
# (CF_API_TOKEN, ADMIN_API_KEY) must be set via `wrangler secret put`
# and are intentionally absent from this file.
# 注: [env.production] には意図的に置かない。本番は GitHub Actions デプロイ
# 運用のため self-update は使わず、vars/secrets 不在で route は実行時ガードで
# 不活性になる (本番挙動を変えないための判断, 2026-07-07)。
# ═══════════════════════════════════════════════════════════════
[vars]
WORKER_NAME = "line-harness"
ADMIN_PAGES_PROJECT = "line-harness-admin"
LIFF_PAGES_PROJECT = "line-harness-liff"
D1_DATABASE_ID = "YOUR_DEV_D1_DATABASE_ID"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
WORKER_PUBLIC_URL = "https://line-harness.workers.dev"
ADMIN_PUBLIC_URL = "https://line-harness-admin.pages.dev"
LIFF_PUBLIC_URL = "https://line-harness-liff.pages.dev"
CF_ACCOUNT_ID = "YOUR_DEV_ACCOUNT_ID"

# ═══════════════════════════════════════════════════════════════
# 本番環境
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute your-database --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"
compatibility_flags = ["nodejs_compat"]

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"
run_worker_first = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["* * * * *", "0 */6 * * *"]
